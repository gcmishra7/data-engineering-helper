<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 476" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="500" height="476" fill="#fafafa" rx="8" />
  <g filter="url(#shadow)">
    <rect x="40" y="224" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="160" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Kafka</text>
    <text x="160" y="264" text-anchor="middle" font-size="10" fill="#555">committed offset</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="160" y="342" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Delta Lake</text>
    <text x="160" y="360" text-anchor="middle" font-size="10" fill="#555">transaction commit</text>
  </g>
</svg>