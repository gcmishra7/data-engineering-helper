<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="800" height="440" fill="#fafafa" rx="8" />

  <!-- Participant lines -->
  <line x1="100" y1="60" x2="100" y2="400" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="320" y1="60" x2="320" y2="400" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="500" y1="60" x2="500" y2="400" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />
  <line x1="700" y1="60" x2="700" y2="400" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Participant boxes -->
  <g filter="url(#shadow)">
    <rect x="40" y="20" width="120" height="40" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="100" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Producer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="230" y="20" width="180" height="40" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="320" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Schema Registry</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="440" y="20" width="120" height="40" rx="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
    <text x="500" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Kafka</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="20" width="120" height="40" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="700" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Consumer</text>
  </g>

  <!-- Step 1: Producer → Schema Registry: Register schema -->
  <line x1="105" y1="100" x2="310" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="207" y="93" text-anchor="middle" font-size="11" fill="#333">Register schema (Avro/Protobuf)</text>

  <!-- Step 2: Schema Registry → Producer: schema_id -->
  <line x1="315" y1="140" x2="105" y2="140" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)" />
  <text x="207" y="133" text-anchor="middle" font-size="11" fill="#777">schema_id = 42</text>

  <!-- Step 3: Producer → Kafka: Produce message -->
  <line x1="105" y1="190" x2="490" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="297" y="183" text-anchor="middle" font-size="11" fill="#333">Produce [schema_id=42 | payload]</text>

  <!-- Step 4: Consumer → Kafka: Consume message -->
  <line x1="695" y1="240" x2="505" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="600" y="233" text-anchor="middle" font-size="11" fill="#333">Consume message</text>

  <!-- Step 5: Consumer → Schema Registry: GET schema -->
  <line x1="695" y1="290" x2="325" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="510" y="283" text-anchor="middle" font-size="11" fill="#333">GET schema for id=42</text>

  <!-- Step 6: Schema Registry → Consumer: Schema definition -->
  <line x1="325" y1="330" x2="695" y2="330" stroke="#999" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)" />
  <text x="510" y="323" text-anchor="middle" font-size="11" fill="#777">Schema definition</text>

  <!-- Step 7: Consumer self: Deserialise -->
  <path d="M 705 365 Q 750 380 705 395" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="720" y="378" font-size="11" fill="#333">Deserialise</text>
</svg>
