<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3080 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="3080" height="300" fill="#fafafa" rx="8" />
  <rect x="25" y="0" width="1170" height="101" rx="8" fill="#f0f4ff" stroke="#b0c4de" stroke-width="1" stroke-dasharray="6,3" />
  <text x="35" y="16" font-size="11" font-weight="bold" fill="#b0c4de">Data Governance Layer</text>
  <rect x="1225" y="0" width="870" height="101" rx="8" fill="#f0fff0" stroke="#90b090" stroke-width="1" stroke-dasharray="6,3" />
  <text x="1235" y="16" font-size="11" font-weight="bold" fill="#90b090">AI Safety Layer</text>
  <rect x="2125" y="0" width="870" height="101" rx="8" fill="#fffaf0" stroke="#d0b880" stroke-width="1" stroke-dasharray="6,3" />
  <text x="2135" y="16" font-size="11" font-weight="bold" fill="#d0b880">Audit Layer</text>
  <g filter="url(#shadow)">
    <rect x="40" y="30" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="160" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">PII Detection</text>
    <text x="160" y="70" text-anchor="middle" font-size="10" fill="#555">before embedding / LLM call</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="30" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="460" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Access Control</text>
    <text x="460" y="70" text-anchor="middle" font-size="10" fill="#555">which users can query which data</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="30" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="760" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">AI Lineage</text>
    <text x="760" y="70" text-anchor="middle" font-size="10" fill="#555">question → chunks → answer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="940" y="30" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="1060" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Data Retention</text>
    <text x="1060" y="70" text-anchor="middle" font-size="10" fill="#555">conversation logs, embeddings</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1240" y="30" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="1360" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Guardrails</text>
    <text x="1360" y="70" text-anchor="middle" font-size="10" fill="#555">input + output validation</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1540" y="30" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="1660" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Prompt Injection Detection</text>
    <text x="1660" y="70" text-anchor="middle" font-size="10" fill="#555">adversarial input filtering</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1840" y="30" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="1960" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Hallucination Detection</text>
    <text x="1960" y="70" text-anchor="middle" font-size="10" fill="#555">faithfulness scoring</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="2140" y="30" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="2260" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Audit Log</text>
    <text x="2260" y="70" text-anchor="middle" font-size="10" fill="#555">who queried what when</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="2440" y="30" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="2560" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Explainability</text>
    <text x="2560" y="70" text-anchor="middle" font-size="10" fill="#555">which chunks drove the answer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="2740" y="30" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="2860" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Cost Attribution</text>
    <text x="2860" y="70" text-anchor="middle" font-size="10" fill="#555">per team, per use case</text>
  </g>
</svg>