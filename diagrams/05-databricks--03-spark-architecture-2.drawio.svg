<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 524" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="500" height="524" fill="#fafafa" rx="8" />
  <g filter="url(#shadow)">
    <rect x="40" y="176" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="160" y="198" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Stage 1</text>
    <text x="160" y="216" text-anchor="middle" font-size="10" fill="#555">read + filter + map</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="272" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="160" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Stage 2</text>
    <text x="160" y="312" text-anchor="middle" font-size="10" fill="#555">aggregate</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="368" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="160" y="390" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Stage 3</text>
    <text x="160" y="408" text-anchor="middle" font-size="10" fill="#555">join + write</text>
  </g>
</svg>