  <text x="380" y="102" text-anchor="middle" font-size="9" fill="#777">Instance Profile</text>
  <line x1="460" y1="86" x2="592.3078084188734" y2="123.80223097682098" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="530" y="102" text-anchor="middle" font-size="9" fill="#777">Kafka protocol</text>
  <g filter="url(#shadow)">
