  </defs>
  <rect width="1280" height="300" fill="#fafafa" rx="8" />
  <rect x="25" y="0" width="570" height="101" rx="8" fill="#f0f4ff" stroke="#b0c4de" stroke-width="1" stroke-dasharray="6,3" />
