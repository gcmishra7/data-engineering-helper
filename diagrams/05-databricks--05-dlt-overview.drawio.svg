<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 572" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="680" height="572" fill="#fafafa" rx="8" />
  <line x1="280" y1="444" x2="337.6138000549124" y2="259.63583982428025" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="280" y1="444" x2="335.76000847997454" y2="354.7839864320407" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <g filter="url(#shadow)">
    <rect x="40" y="128" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="160" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Source: Kafka / Files / Delta</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="224" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="160" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Bronze Table</text>
    <text x="160" y="264" text-anchor="middle" font-size="10" fill="#555">@dlt.table + @dlt.expect</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="224" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="460" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Silver Table</text>
    <text x="460" y="264" text-anchor="middle" font-size="10" fill="#555">@dlt.table + @dlt.expect_or_drop</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="320" width="240" height="56" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
    <text x="460" y="342" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Gold Table</text>
    <text x="460" y="360" text-anchor="middle" font-size="10" fill="#555">@dlt.table + @dlt.expect_or_fail</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="240" height="56" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" />
    <text x="160" y="353" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">BI / ML</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="416" width="240" height="56" rx="8" fill="#d0e0e3" stroke="#56839b" stroke-width="1.5" />
    <text x="160" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Event Log</text>
    <text x="160" y="456" text-anchor="middle" font-size="10" fill="#555">quality metrics, lineage, timing</text>
  </g>
</svg>