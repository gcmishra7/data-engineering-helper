<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 572" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12" />
    </filter>
  </defs>
  <rect width="980" height="572" fill="#fafafa" rx="8" />
  <line x1="280" y1="444" x2="336.9230769230769" y2="307.38461538461536" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="280" y1="444" x2="336.9230769230769" y2="307.38461538461536" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="580" y1="300" x2="632.0" y2="300.0" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <line x1="580" y1="300" x2="632.0" y2="300.0" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <g filter="url(#shadow)">
    <rect x="40" y="128" width="240" height="56" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" />
    <text x="160" y="161" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">First run</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="224" width="240" height="56" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" />
    <text x="160" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Process ALL rows</text>
    <text x="160" y="264" text-anchor="middle" font-size="10" fill="#555">build full table</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="240" height="56" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5" />
    <text x="160" y="353" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Subsequent runs</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="40" y="416" width="240" height="56" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" />
    <text x="160" y="449" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">incremental mode</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="272" width="240" height="56" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5" />
    <text x="460" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Filter: only rows</text>
    <text x="460" y="312" text-anchor="middle" font-size="10" fill="#555">since last run</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="640" y="272" width="240" height="56" rx="8" fill="#d0e0e3" stroke="#56839b" stroke-width="1.5" />
    <text x="760" y="294" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">MERGE or INSERT</text>
    <text x="760" y="312" text-anchor="middle" font-size="10" fill="#555">into existing table</text>
  </g>
</svg>