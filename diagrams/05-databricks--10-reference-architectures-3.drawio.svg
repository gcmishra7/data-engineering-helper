  <line x1="160" y1="86" x2="292.30780841887344" y2="123.80223097682098" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="230" y="102" text-anchor="middle" font-size="9" fill="#777">Delta UniForm, Iceberg metadata</text>
  <line x1="160" y1="86" x2="592.0328543482584" y2="125.27571403165985" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
