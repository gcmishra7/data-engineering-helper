  <line x1="460" y1="86" x2="307.76114000116263" y2="124.05971499970934" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="380" y="102" text-anchor="middle" font-size="9" fill="#777">Databricks-to-BigQuery, spark-bigquery connector</text>
